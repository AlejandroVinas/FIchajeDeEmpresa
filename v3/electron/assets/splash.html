<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline' 'self'" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fichaje</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f172a;
        --card: #111827;
        --line: #1f2937;
        --text: #e5e7eb;
        --muted: #94a3b8;
        --accent: #22c55e;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, Segoe UI, Arial, sans-serif;
        background: radial-gradient(circle at top, #1e293b 0%, var(--bg) 55%);
        color: var(--text);
      }
      .card {
        width: min(520px, calc(100vw - 48px));
        background: rgba(17, 24, 39, 0.9);
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 20px;
        padding: 28px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      }
      .logo {
        width: 56px;
        height: 56px;
        border-radius: 16px;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #22c55e, #16a34a);
        color: white;
        font-size: 28px;
        font-weight: 700;
      }
      h1 {
        margin: 16px 0 8px;
        font-size: 26px;
      }
      p {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.5;
      }
      .bar {
        width: 100%;
        height: 10px;
        background: #0b1220;
        border: 1px solid var(--line);
        border-radius: 999px;
        overflow: hidden;
      }
      .bar > span {
        display: block;
        width: 42%;
        height: 100%;
        background: linear-gradient(90deg, #22c55e, #4ade80);
        border-radius: inherit;
        animation: load 1.2s ease-in-out infinite alternate;
      }
      .note {
        margin-top: 14px;
        font-size: 13px;
        color: #cbd5e1;
      }
      @keyframes load {
        from { transform: translateX(-10%); width: 28%; }
        to   { transform: translateX(180%); width: 40%; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">F</div>
      <h1>Iniciando Fichaje</h1>
      <p>Se está levantando el backend local y cargando el panel de administración.</p>
      <div class="bar"><span></span></div>
      <div class="note">La primera ejecución puede tardar un poco más.</div>
    </div>
  </body>
</html>
