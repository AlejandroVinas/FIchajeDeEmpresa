<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      background: #0F1B2D;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      border-radius: 12px;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }
    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -.5px;
      margin-bottom: 6px;
    }
    h1 span { color: #D4440F; }
    p {
      font-size: .8rem;
      color: rgba(255,255,255,.4);
      margin-bottom: 36px;
      font-family: monospace;
      letter-spacing: .1em;
      text-transform: uppercase;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,255,255,.15);
      border-top-color: #D4440F;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    .status {
      margin-top: 16px;
      font-size: .75rem;
      color: rgba(255,255,255,.3);
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>Fichaje <span>v2</span></h1>
  <p>Panel de Administración</p>
  <div class="spinner"></div>
  <p class="status">Iniciando servidor…</p>
</body>
</html>
