<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de Administración — Fichaje</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f2f5; color: #1a1a2e; }
    header { background: #3730a3; color: white; padding: 1rem 2rem;
             display: flex; justify-content: space-between; align-items: center; }
    main { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
    section { background: white; border-radius: 10px; padding: 1.5rem;
              margin-bottom: 2rem; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
    h2 { font-size: 1.1rem; margin-bottom: 1rem; color: #3730a3;
         display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; }
    input, select { border: 1px solid #ccc; border-radius: 6px;
                    padding: .45rem .7rem; font-size: .9rem; }
    button { background: #3730a3; color: white; border: none; border-radius: 6px;
             padding: .45rem 1rem; cursor: pointer; font-size: .9rem; }
    button:hover { background: #4338ca; }
    button.danger  { background: #dc2626; }
    button.success { background: #166534; }
    button.ghost   { background: transparent; color: #3730a3;
                     border: 1px solid #3730a3; }
    button:disabled { opacity: .45; cursor: default; }
    table { width: 100%; border-collapse: collapse; font-size: .88rem; }
    th { background: #f8fafc; text-align: left; padding: .6rem .8rem;
         border-bottom: 2px solid #e2e8f0; white-space: nowrap; }
    td { padding: .55rem .8rem; border-bottom: 1px solid #f1f5f9; }
    tr:hover td { background: #f8fafc; }
    .badge { display: inline-block; border-radius: 99px; padding: .2rem .7rem;
             font-size: .78rem; font-weight: 600; }
    .entrada { background: #dcfce7; color: #166534; }
    .salida  { background: #fee2e2; color: #991b1b; }
    #loginSection { max-width: 380px; margin: 4rem auto; }
    .form-row { display: flex; gap: .65rem; flex-wrap: wrap; align-items: flex-end; }
    .form-row label { display: flex; flex-direction: column; gap: .25rem;
                      font-size: .82rem; font-weight: 600; }
    .msg { margin-top: .65rem; font-size: .85rem; }
    .ok  { color: #166534; } .err { color: #991b1b; }
    #app { display: none; }
    .filtros { background: #f8fafc; border-radius: 8px; padding: 1rem;
               margin-bottom: 1rem; display: flex; gap: .65rem;
               flex-wrap: wrap; align-items: flex-end; }
    .filtros label { display: flex; flex-direction: column; gap: .25rem;
                     font-size: .82rem; font-weight: 600; }
    .paginacion { display: flex; align-items: center; gap: .5rem;
                  margin-top: 1rem; font-size: .88rem; flex-wrap: wrap; }
    .paginacion span { color: #555; }
  </style>
</head>
<body>

<!-- LOGIN -->
<section id="loginSection">
  <h2>Acceso al panel</h2>
  <div style="display:flex;flex-direction:column;gap:.75rem;margin-top:.75rem">
    <label style="font-size:.85rem;font-weight:600;display:flex;flex-direction:column;gap:.3rem">
      Email <input id="loginEmail" type="email" placeholder="admin@empresa.com" />
    </label>
    <label style="font-size:.85rem;font-weight:600;display:flex;flex-direction:column;gap:.3rem">
      Contraseña <input id="loginPass" type="password" />
    </label>
    <button onclick="doLogin()">Entrar</button>
    <span id="loginMsg" class="msg"></span>
  </div>
</section>

<!-- PANEL -->
<div id="app">
  <header>
    <span>Panel de Fichaje</span>
    <div style="display:flex;align-items:center;gap:1rem">
      <span id="pushEstado" style="font-size:.82rem;opacity:.8"></span>
      <button onclick="doLogout()" style="background:rgba(255,255,255,.2)">
        Cerrar sesión
      </button>
    </div>
  </header>
  <main>

    <!-- Crear empleado -->
    <section>
      <h2>Crear empleado</h2>
      <div class="form-row">
        <label>Nombre    <input id="eNombre" type="text" /></label>
        <label>Email     <input id="eEmail"  type="email" /></label>
        <label>Contraseña <input id="ePass"  type="password" /></label>
        <label>Rol
          <select id="eRole">
            <option value="empleado">Empleado</option>
            <option value="admin">Admin</option>
          </select>
        </label>
        <label>Clave pública Ed25519
          <input id="eClavePub" type="text"
                 placeholder="base64 — el empleado la ve en la app"
                 style="width:280px;font-family:monospace;font-size:.8rem" />
        </label>
        <button onclick="crearEmpleado()">Crear</button>
      </div>
      <span id="empleadoMsg" class="msg"></span>
    </section>

    <!-- Lista empleados -->
    <section>
      <h2>
        Empleados
        <button class="ghost" style="font-size:.78rem;padding:.25rem .7rem"
                onclick="cargarEmpleados()">↺ Recargar</button>
      </h2>
      <table id="tablaEmpleados">
        <thead>
          <tr>
            <th>ID</th><th>Nombre</th><th>Email</th>
            <th>Rol</th><th>Clave pública</th><th>Acciones</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <!-- Fichajes -->
    <section>
      <h2>
        Fichajes
        <button class="ghost" style="font-size:.78rem;padding:.25rem .7rem"
                onclick="aplicarFiltros()">↺ Recargar</button>
        <button class="success" style="font-size:.78rem;padding:.25rem .7rem"
                onclick="exportarCSV()">⬇ Exportar CSV</button>
      </h2>

      <div class="filtros">
        <label>Empleado
          <select id="fEmpleado">
            <option value="">Todos</option>
          </select>
        </label>
        <label>Tipo
          <select id="fTipo">
            <option value="">Todos</option>
            <option value="entrada">Entrada</option>
            <option value="salida">Salida</option>
          </select>
        </label>
        <label>Desde <input type="date" id="fDesde" /></label>
        <label>Hasta <input type="date" id="fHasta" /></label>
        <button onclick="aplicarFiltros()">Filtrar</button>
        <button class="ghost" onclick="limpiarFiltros()">Limpiar</button>
      </div>

      <table id="tablaFichajes">
        <thead>
          <tr>
            <th>Empleado</th><th>Tipo</th><th>Fecha / hora</th>
            <th>Lat</th><th>Lon</th><th>Plataforma</th><th>Firma</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>

      <div class="paginacion">
        <button id="btnAnterior" onclick="cambiarPagina(-1)">← Anterior</button>
        <span id="infoPagina">—</span>
        <button id="btnSiguiente" onclick="cambiarPagina(1)">Siguiente →</button>
        <span id="infoTotal"></span>
        <label style="margin-left:auto;font-size:.82rem;font-weight:600;
                      display:flex;align-items:center;gap:.4rem">
          Por página
          <select onchange="cambiarLimite(this.value)">
            <option value="25">25</option>
            <option value="50" selected>50</option>
            <option value="100">100</option>
            <option value="200">200</option>
          </select>
        </label>
      </div>
    </section>

  </main>
</div>

<script>
  // ← Cambia por la URL real de tu backend
  const API = 'http://localhost:3000';

  let token        = localStorage.getItem('token');
  let paginaActual = 1;
  let limiteActual = 50;
  let totalPaginas = 1;
  let swRegistration = null;

  if (token) mostrarPanel();

  // ── Auth ──────────────────────────────────────────────────────────────────
  async function doLogin() {
    const msg = document.getElementById('loginMsg');
    try {
      const res = await apiFetch('/auth/login', 'POST', {
        email:    document.getElementById('loginEmail').value,
        password: document.getElementById('loginPass').value,
      }, false);
      token = res.token;
      localStorage.setItem('token', token);
      mostrarPanel();
    } catch (e) {
      msg.textContent = e.message; msg.className = 'msg err';
    }
  }

  function doLogout() {
    cancelarPush();
    localStorage.removeItem('token');
    token = null;
    document.getElementById('app').style.display = 'none';
    document.getElementById('loginSection').style.display = '';
  }

  function mostrarPanel() {
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    cargarEmpleados();
    cargarFiltroEmpleados();
    cargarFichajes();
    inicializarPush();
  }

  // ── Empleados ─────────────────────────────────────────────────────────────
  async function crearEmpleado() {
    const msg      = document.getElementById('empleadoMsg');
    const clavePub = document.getElementById('eClavePub').value.trim();
    try {
      await apiFetch('/empleados', 'POST', {
        nombre:        document.getElementById('eNombre').value,
        email:         document.getElementById('eEmail').value,
        password:      document.getElementById('ePass').value,
        role:          document.getElementById('eRole').value,
        clave_publica: clavePub || undefined,
      });
      msg.textContent = 'Empleado creado correctamente.';
      msg.className = 'msg ok';
      cargarEmpleados();
      cargarFiltroEmpleados();
    } catch (e) {
      msg.textContent = e.message; msg.className = 'msg err';
    }
  }

  async function cargarEmpleados() {
    const data  = await apiFetch('/empleados', 'GET');
    const tbody = document.querySelector('#tablaEmpleados tbody');
    tbody.innerHTML = data.map(e => `
      <tr>
        <td>${e.id}</td>
        <td>${e.nombre}</td>
        <td>${e.email}</td>
        <td>${e.role}</td>
        <td>${e.tiene_clave_publica ? '🔑 Sí' : '⚠️ No'}</td>
        <td>
          <button class="ghost" style="font-size:.78rem;padding:.2rem .6rem"
                  onclick="actualizarClave(${e.id})">Actualizar clave</button>
          <button class="danger" style="margin-left:.3rem;font-size:.78rem;padding:.2rem .6rem"
                  onclick="eliminarEmpleado(${e.id})">Eliminar</button>
        </td>
      </tr>`).join('');
  }

  async function cargarFiltroEmpleados() {
    const data = await apiFetch('/empleados', 'GET');
    const sel  = document.getElementById('fEmpleado');
    sel.innerHTML = '<option value="">Todos</option>' +
      data.map(e => `<option value="${e.id}">${e.nombre}</option>`).join('');
  }

  async function eliminarEmpleado(id) {
    if (!confirm('¿Eliminar este empleado?')) return;
    await apiFetch(`/empleados/${id}`, 'DELETE');
    cargarEmpleados();
    cargarFichajes();
  }

  async function actualizarClave(id) {
    const clave = prompt('Pega la nueva clave pública Ed25519 (base64 de 44 chars):');
    if (!clave) return;
    try {
      await apiFetch(`/empleados/${id}/clave-publica`, 'PUT',
        { clave_publica: clave.trim() });
      alert('Clave actualizada correctamente.');
      cargarEmpleados();
    } catch (e) { alert('Error: ' + e.message); }
  }

  // ── Fichajes ──────────────────────────────────────────────────────────────
  function getFiltros() {
    return {
      empleado_id: document.getElementById('fEmpleado').value,
      tipo:        document.getElementById('fTipo').value,
      desde:       document.getElementById('fDesde').value,
      hasta:       document.getElementById('fHasta').value,
    };
  }

  function buildQuery(extras = {}) {
    const params = {
      ...getFiltros(), pagina: paginaActual, limite: limiteActual, ...extras,
    };
    return Object.entries(params)
      .filter(([, v]) => v !== '' && v != null)
      .map(([k, v]) => `${k}=${encodeURIComponent(v)}`)
      .join('&');
  }

  async function cargarFichajes() {
    const data   = await apiFetch(`/fichajes?${buildQuery()}`, 'GET');
    totalPaginas = data.paginas || 1;

    const firmaIcon = v =>
      v === 1 ? '<span title="Firma válida">✅</span>' :
      v === 0 ? '<span title="Firma inválida — posible manipulación" style="cursor:help">❌</span>' :
                '<span title="Sin firma registrada" style="color:#aaa">—</span>';

    const tbody = document.querySelector('#tablaFichajes tbody');
    tbody.innerHTML = data.datos.map(f => `
      <tr>
        <td>${f.nombre}</td>
        <td><span class="badge ${f.tipo}">${f.tipo}</span></td>
        <td>${new Date(f.timestamp).toLocaleString('es-ES')}</td>
        <td>${f.lat != null ? f.lat.toFixed(5) : '—'}</td>
        <td>${f.lon != null ? f.lon.toFixed(5) : '—'}</td>
        <td>${f.plataforma ?? '—'}</td>
        <td style="text-align:center">${firmaIcon(f.firma_valida)}</td>
      </tr>`).join('');

    document.getElementById('infoPagina').textContent =
      `Página ${data.pagina} de ${data.paginas}`;
    document.getElementById('infoTotal').textContent =
      `${data.total} fichaje${data.total !== 1 ? 's' : ''}`;
    document.getElementById('btnAnterior').disabled  = paginaActual <= 1;
    document.getElementById('btnSiguiente').disabled = paginaActual >= totalPaginas;
  }

  function aplicarFiltros() { paginaActual = 1; cargarFichajes(); }

  function limpiarFiltros() {
    document.getElementById('fEmpleado').value = '';
    document.getElementById('fTipo').value     = '';
    document.getElementById('fDesde').value    = '';
    document.getElementById('fHasta').value    = '';
    aplicarFiltros();
  }

  function cambiarPagina(delta) {
    const nueva = paginaActual + delta;
    if (nueva < 1 || nueva > totalPaginas) return;
    paginaActual = nueva;
    cargarFichajes();
  }

  function cambiarLimite(valor) {
    limiteActual = parseInt(valor);
    paginaActual = 1;
    cargarFichajes();
  }

  async function exportarCSV() {
    const res = await fetch(`${API}/fichajes/exportar.csv?${buildQuery()}`, {
      headers: { 'Authorization': `Bearer ${token}` },
    });
    if (!res.ok) return alert('Error al exportar');
    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `fichajes_${new Date().toISOString().slice(0, 10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  // ── Push notifications ────────────────────────────────────────────────────
  async function inicializarPush() {
    const estadoEl = document.getElementById('pushEstado');
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
      estadoEl.textContent = '🔕 Push no soportado';
      return;
    }

    swRegistration = await navigator.serviceWorker.register('/sw.js');

    const permiso = await Notification.requestPermission();
    if (permiso !== 'granted') {
      estadoEl.textContent = '🔕 Notificaciones desactivadas';
      return;
    }

    try {
      const { publicKey } = await apiFetch('/push/vapid-public-key', 'GET');
      const suscripcion   = await swRegistration.pushManager.subscribe({
        userVisibleOnly:      true,
        applicationServerKey: urlBase64ToUint8Array(publicKey),
      });
      await apiFetch('/push/suscribir', 'POST', suscripcion.toJSON());
      estadoEl.textContent = '🔔 Notificaciones activas';
    } catch (e) {
      console.error('[push] Error al suscribirse:', e);
      estadoEl.textContent = '🔕 Error en notificaciones';
    }
  }

  async function cancelarPush() {
    if (!swRegistration) return;
    const sub = await swRegistration.pushManager.getSubscription();
    if (!sub) return;
    await apiFetch('/push/suscribir', 'DELETE', { endpoint: sub.endpoint })
      .catch(() => {});
    await sub.unsubscribe();
  }

  function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - base64String.length % 4) % 4);
    const base64  = (base64String + padding)
      .replace(/-/g, '+').replace(/_/g, '/');
    const rawData = atob(base64);
    return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
  }

  // ── Helper fetch ──────────────────────────────────────────────────────────
  async function apiFetch(path, method, body, useToken = true) {
    const headers = { 'Content-Type': 'application/json' };
    if (useToken && token) headers['Authorization'] = `Bearer ${token}`;

    const res = await fetch(
      path.startsWith('http') ? path : API + path,
      { method, headers, body: body ? JSON.stringify(body) : undefined }
    );

    if (res.status === 401) { doLogout(); throw new Error('Sesión expirada'); }
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Error del servidor');
    return data;
  }
</script>
</body>
</html>
